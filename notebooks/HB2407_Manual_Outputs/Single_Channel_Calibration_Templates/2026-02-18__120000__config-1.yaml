# Calibration template
# Auto-generated from raw file channel configurations.
#
# Most parameters use SONAR-netCDF4 v2.1 naming conventions:
# https://htmlpreview.github.io/?https://github.com/ices-publications/SONAR-netCDF4/blob/master/Formatted_docs/crr341.html
#
# YAML formatting guide:
# https://docs.ansible.com/projects/ansible/latest/reference_appendices/YAMLSyntax.html
#
# Instructions:
# 1. Verify calibration date is correct: 2026-02-18
# 2. Fill in core calibration values: gain_correction, sa_correction, equivalent_beam_angle
# 3. Fill in environmental parameters OR temperature/salinity/pressure to calculate them
# 4. Fill in beam parameters and optional fields
#
# Do not modify the channel identification parameters at the top
# (transceiver_id, transducer_model, pulse_form, frequency_*, transmit_power,
# transmit_duration_nominal) as these are used for matching to raw files.
#
# Parameter requirements:
#   [MAPPING]  = Required for matching calibration to raw files (do not modify)
#   [REQUIRED] = Required for calibration
#   [OPTIONAL] = Optional
#
# File naming: use a unique name, recommended format:
# YYYY-MM-DD_<frequency in Hz>_<unique configuration id per frequency>

record_created: "2026-04-14T17:00:33.675154+00:00" # automatically populated when record is created
record_author: "Placeholder Author" # Name of person or organization who authored this file
channel: "WBT 400517-15 ES120-7C_ES"  # Channel identifier
transceiver_id: "400517"  # [MAPPING] Transceiver ID for matching
transceiver_model: "WBT"  # Transceiver model
transceiver_ethernet_address: "009072061c85"
transceiver_serial_number: "400517"
transceiver_number: 4
transceiver_port: 15
channel_instance_number: 1
transducer_model: "ES120-7C"  # [MAPPING] Transducer model for matching
transducer_serial_number: null # [MAPPING] Ideally provided for mapping, ignored if missing.
pulse_form: "0"  # [MAPPING] Pulse form (0=CW, 1=FM) for matching
frequency_start: 120000.0  # [MAPPING] Start frequency for matching
frequency_end: 120000.0  # [MAPPING] End frequency for matching
frequency: [120000.0]
nominal_transducer_frequency: 120000.0  # Nominal CW operating frequency of transducer (Hz)
transmit_power: 250.0  # [MAPPING] Transmit power for matching
transmit_duration_nominal: 0.001024  # [MAPPING] Pulse duration for matching
multiplexing_found: false

# Calibration metadata
calibration_date: "2026-02-18"  # [REQUIRED] Date of calibration (YYYY-MM-DD)
calibration_comments: null  # [OPTIONAL] Notes about calibration
calibration_version: null  # [OPTIONAL] Calibration version identifier

# Core calibration parameters
gain_correction: [null]  # [REQUIRED] Transducer gain correction (dB)
sa_correction: [null]  # [REQUIRED] Sa correction factor (dB). Only used in Sv calculation
equivalent_beam_angle: null  # [REQUIRED] (dB re sr). Only used in Sv calculation

# Environmental parameters
# Option A: Provide sound_speed and absorption directly
# Option B: Provide temperature, salinity, pressure, acidity
absorption_indicative: null  # [REQUIRED*] Sound absorption coefficient (dB/m) - *or provide T/S/P/acidity
sound_speed_indicative: null  # [REQUIRED*] Sound speed (m/s) - *or provide T/S/P/acidity

# Physical environment (can be used to calculate sound_speed/absorption)
temperature: null  # [OPTIONAL] Water temperature (deg C) - used to calculate sound_speed & absorption
salinity: null  # [OPTIONAL] Water salinity (PSU) - used to calculate sound_speed & absorption
acidity: null  # [OPTIONAL] Water pH (acidity) - used to calculate absorption (default 8.1 if not provided)
pressure: null  # [OPTIONAL] Water pressure (dbar) - used to calculate sound_speed & absorption

# Beam parameters (not currently supported as user parameters in Echopype)
beamwidth_transmit_major: [null]  # [REQUIRED] Transmit beamwidth major axis (degrees)
beamwidth_receive_major: [null]  # [REQUIRED] Receive beamwidth major axis (degrees)
beamwidth_transmit_minor: [null]  # [REQUIRED] Transmit beamwidth minor axis (degrees)
beamwidth_receive_minor: [null]  # [REQUIRED] Receive beamwidth minor axis (degrees)
echoangle_major: [null]  # [REQUIRED] Echo angle offset major axis (degrees)
echoangle_minor: [null]  # [REQUIRED] Echo angle offset minor axis (degrees)
echoangle_major_sensitivity: [null]  # [OPTIONAL] Angle sensitivity major axis
echoangle_minor_sensitivity: [null]  # [OPTIONAL] Angle sensitivity minor axis

# Optional raw configuration parameters
# sample_interval: Stored per-ping in raw file. Used by echopype to calculate range
# (range = range_sample * sample_interval * sound_speed / 2). Not needed for mapping.
sample_interval: null

# transmit_bandwidth: Derived from other parameters. For CW: function of pulse duration
# and frequency. For FM: approximately (frequency_end - frequency_start).
transmit_bandwidth: null

# Calibration provenance
calibration_acquisition_method: null  # [OPTIONAL] Method (e.g., sphere, in-situ)
sphere_diameter: null  # [OPTIONAL] Calibration sphere diameter (mm)
sphere_material: null  # [OPTIONAL] Sphere material (e.g., tungsten carbide, copper)
beam_type: null  # [OPTIONAL] Beam type
source_filenames: null  # [OPTIONAL] Source calibration filenames
source_file_type: "manual"
source_file_location: null  # [OPTIONAL] Location of source files
source_file_paths: null  # [OPTIONAL] Full paths to source files
sonar_software_version: null  # [OPTIONAL] Sonar software version during calibration
sonar_software_name: null  # [OPTIONAL] Sonar software name
